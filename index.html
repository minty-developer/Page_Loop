<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>PageLoop</title>
    </head>
    <body>
        <header>
            <div class="overlay"></div>
            <h1>Page Loop</h1>
        </header>
        <section class="main_Page">
            <section class="intro">
                <h3 class="intro_text">
                    PageLoop는<br>
                    책과 이야기를 편하게 읽을 수 있는 웹 기반 독서 공간입니다.<br>
                    <br>
                    불필요한 기능 없이<br>
                    읽는 경험에만 집중할 수 있도록 설계되었습니다.
                </h3>
            </section>
            <section class="book-choose">
                <div class="book-card" data-book="무제">
                    <h2>무제</h2>
                    <h3>이중인격 아이의 범인 추리극!</h3>
                </div>
                <div class="book-card" data-book="비밀연애">
                    <h2>비밀 연애</h2>
                    <h3>어느 학교로 전학간 주인공의 스릴 넘치는 비밀 연애 스토리</h3>
                </div>
                <div class="book-card" data-book="book1">
                    <h2>제목</h2>
                    <h3>설명 텍스트...</h3>
                </div>
            </section>
        </section>
        <script src="script.js"></script>
    </body>
</html>
